# =========================
# LY DISPLAY MANAGER CONFIG
# =========================

# --- Animation ---
animation = gameoflife

gameoflife_entropy_interval = 10
gameoflife_frame_delay = 6
gameoflife_initial_density = 0.4
gameoflife_fg = 0x0000FF00

# --- Appearance ---
full_color = true
bg = 0x00000000
fg = 0x00FFFFFF
border_fg = 0x00FFFFFF
blank_box = true
hide_borders = false

# --- Login behavior ---
allow_empty_password = true
clear_password = false
default_input = login
input_len = 34

# --- Sessions ---
shell = true
waylandsessions = /usr/share/wayland-sessions
xsessions = /usr/share/xsessions
service_name = ly

# --- Key / power controls ---
shutdown_key = F1
restart_key = F2
sleep_key = F3
hibernate_key = F4
brightness_down_key = F5
brightness_up_key = F6
show_password_key = F7

shutdown_cmd = /sbin/shutdown -a now
restart_cmd = /sbin/shutdown -r now
brightness_down_cmd = /usr/bin/brightnessctl -q set 10%-
brightness_up_cmd = /usr/bin/brightnessctl -q set +10%

# --- Clock / UI ---
clock = null
show_tty = false
text_in_center = false
hide_version_string = false
hide_key_hints = false

# --- Session logging ---
session_log = .local/state/ly-session.log

# --- Startup hooks ---
start_cmd = /etc/ly/startup.sh
setup_cmd = /etc/ly/setup.sh

# --- Input ---
vi_mode = false
vi_default_mode = normal

# --- Save last session ---
save = true
