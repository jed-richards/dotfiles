# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
# monitor= name, resolution, position, scale
monitor=eDP-1,preferred,auto,auto
monitor=DP-3,preferred,auto-left,auto
# monitor=DP-2,preferred,auto-up,auto

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$browser = zen-browser
$notes = obsidian
$slack = slack
$music = spotify

# focus-or-spawn: switch to app workspace or launch if not running
$fos = ~/.config/hypr/scripts/focus-or-spawn.sh

# Launcher (walker): Raycast-style — apps, windows, clipboard, calculator, etc.
$launcher = walker


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = waybar
exec-once = dunst
exec-once = hyprpaper
exec-once = hypridle
exec-once = systemctl --user start elephant # walker backend
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = systemctl --user start hyprpolkitagent


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 3
    gaps_out = 2, 0, 0, 0

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}


# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 0
    rounding_power = 4

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0
    dim_inactive = false
    dim_strength = 0.7

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = false
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    # caps should escape
    kb_options = caps:escape

    follow_mouse = 2

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false

        # push touchpad to click (not tap)
        # clickfinger_behavior fixes right/middle click
        tap-to-click = false
        clickfinger_behavior = true
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
# SHIFT CAPS CTRL/CONTROL ALT MOD2 MOD3 SUPER/WIN/LOGO/MOD4 MOD5
$mod = SUPER

# https://wiki.hypr.land/Configuring/Binds/
# bind = MODS, key, dispatcher, params

# Hyprland
bind = $mod + SHIFT + CTRL, e, exit,
bind = $mod + SHIFT + CTRL, r, exec, hyprctl reload
bind = $mod, q, killactive,
bind = $mod, Escape, exec, hyprlock
bind = $mod, f, fullscreen, 1 # keep bar
bind = $mod + SHIFT, f, fullscreenstate, 2 0
bind = $mod, t, exec, killall waybar || waybar

# Apps
# mod+Return: spawn terminal on current workspace (no mnemonic workspace)
bind = $mod, Return, exec, $terminal

# Mnemonic workspace bindings: focus app or spawn on its named workspace
# G = Ghostty (code terminal), B = Browser, N = Notes, S = Slack, M = Music
# To find window classes: hyprctl clients -j | jq '.[].class'
bind = $mod, g, exec, $fos ghostty com.mitchellh.ghostty $terminal
bind = $mod, b, exec, $fos browser zen $browser
bind = $mod, n, exec, $fos notes obsidian $notes
bind = $mod, s, exec, $fos slack Slack $slack
bind = $mod, m, exec, $fos music Spotify $music

# Launcher (mod+Space): Raycast-style app/window switcher
bind = $mod, Space, exec, $launcher

# Clipboard history (mod+V): open walker in clipboard module
bind = $mod, v, exec, walker --modules clipboard

# Navigation
bind=$mod, h, movefocus, l
bind=$mod, j, movefocus, d
bind=$mod, k, movefocus, u
bind=$mod, l, movefocus, r
bind=$mod + SHIFT, h, movewindow, l
bind=$mod + SHIFT, j, movewindow, d
bind=$mod + SHIFT, k, movewindow, u
bind=$mod + SHIFT, l, movewindow, r
bind=$mod + SHIFT + CTRL, h, movewindow, mon:l
bind=$mod + SHIFT + CTRL, l, movewindow, mon:r

## Switch workspaces with mod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

## Move active window to a workspace with mod + SHIFT + [0-9] (don't switch workspaces)
bind = $mod SHIFT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT, 5, movetoworkspacesilent, 5
bind = $mod SHIFT, 6, movetoworkspacesilent, 6
bind = $mod SHIFT, 7, movetoworkspacesilent, 7
bind = $mod SHIFT, 8, movetoworkspacesilent, 8
bind = $mod SHIFT, 9, movetoworkspacesilent, 9
bind = $mod SHIFT, 0, movetoworkspacesilent, 10

# Floating windows
bind = $mod + CTRL, f, togglefloating
bind = $mod + SHIFT, c, centerwindow
bind = $mod + SHIFT, p, pin

# Special workspace (scratchpad) — rebound since S is now Slack
# bind = $mod, grave, togglespecialworkspace, magic
# bind = $mod SHIFT, grave, movetoworkspace, special:magic

# Move/resize windows with mod + LMB/RMB and dragging
bindm = ALT, mouse:272, movewindow
bindm = ALT, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Mnemonic workspace assignments: apps always land on their named workspace
windowrule = match:class com.mitchellh.ghostty, workspace name:ghostty
windowrule = match:class zen, workspace name:browser
windowrule = match:class obsidian, workspace name:notes
windowrule = match:class Slack, workspace name:slack
windowrule = match:class Spotify, workspace name:music

# Ignore maximize requests from apps. You'll probably like this.
# windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
# windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

debug {
    disable_logs = false
    enable_stdout_logs = true
}
