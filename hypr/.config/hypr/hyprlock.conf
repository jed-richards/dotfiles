# https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/

auth {
    fingerprint {
        enabled = true
        ready_message = try finger
        present_message = trying the finger
        retry_delay = 250 # ms
    }
}

background {
    monitor =
    path = screenshot
    blur_passes = 5
    blur_size = 6
    noise = 0.02
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 2

    dots_size = 0.2
    dots_spacing = 0.15
    dots_center = true

    inner_color = rgba(30, 30, 30, 0.4)
    outer_color = rgba(255, 255, 255, 0.1)
    check_color = rgba(100, 200, 255, 0.8)
    fail_color = rgba(255, 80, 80, 0.8)

    font_color = rgba(255, 255, 255, 0.9)

    fade_on_empty = true
    rounding = 8

    position = 0, -200
    halign = center
    valign = center

    placeholder_text = Password or Fingerprint
    placeholder_color = rgba(255, 255, 255, 0.35)

    fail_text = Authentication failed
}

label { # Clock
    monitor =
    text = $TIME
    font_size = 72
    position = 0, -70
    halign = center
    valign = center
    shadow_passes = 2
    shadow_color = rgba(0, 0, 0, 0.6)
}

label { # Date
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    font_size = 18
    position = 0, -130
    halign = center
    valign = center
    color = rgba(255, 255, 255, 0.7)
}

label { # Fingerprint hint
    monitor =
    text = $FPRINTPROMPT
    font_size = 16
    position = 0, -260
    halign = center
    valign = center
    color = rgba(255, 255, 255, 0.5)
}
